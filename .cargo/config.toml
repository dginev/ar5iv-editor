# latexml-oxide compiles a few crates (notably latexml_contrib) that drive
# rustc's own stack into overflow at the default 8 MB. Match the upstream
# project's own `.cargo/config.toml` and bump it for the build environment.
[env]
RUST_MIN_STACK = "16777216"

# Compile to the host CPU's exact feature set so AVX2 / BMI2 / etc. are
# available to hot loops in the conversion engine. The resulting binary
# is *not* portable across machines — fine for local servers, swap to
# `target-cpu=x86-64-v3` (or omit) if you ever distribute prebuilt binaries.
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]
[target.'cfg(target_arch = "aarch64")']
rustflags = ["-C", "target-cpu=native"]
