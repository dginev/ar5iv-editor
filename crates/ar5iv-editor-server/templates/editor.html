{% extends "base.html" %}
{% block title %}ar5iv-editor &mdash; LaTeX Web Editor{% endblock %}
{% block main %}
<section class="ar5iv-editor-shell">
  <div class="pane pane-files">
    <div class="pane-header">
      <span class="pane-title">Files</span>
      <span class="pane-actions" aria-hidden="true">
        <button id="file-new" type="button" title="New file (Phase 5)" disabled>+</button>
        <button id="file-upload" type="button" title="Upload (Phase 5)" disabled>↑</button>
      </span>
    </div>
    <div id="file-tree" class="file-tree" role="tree"></div>
  </div>
  <div class="resizer" data-edge="files-source" role="separator"
       aria-orientation="vertical" tabindex="0"
       aria-label="Resize file panel"></div>
  <div class="pane pane-source">
    <div class="pane-header">
      <select id="example-select"><option value="" disabled selected hidden>&mdash; examples &mdash;</option></select>
    </div>
    <div class="pane-stats" id="source-stats">
      <span class="caption">Source</span>
      <span id="char-count" class="muted">0 chars</span>
    </div>
    <div id="codemirror-host" class="codemirror-host"></div>
  </div>
  <div class="resizer" data-edge="source-preview" role="separator"
       aria-orientation="vertical" tabindex="0"
       aria-label="Resize source panel"></div>
  <div class="pane pane-preview">
    <div class="pane-header">
      <span id="preview-title">Preview</span>
    </div>
    <div class="pane-stats" id="preview-stats" aria-live="polite">
      <span class="caption">Conversion stats</span>
      <span id="status">ready</span>
      <span id="timings" class="timings"></span>
    </div>
    <div id="preview" class="preview"></div>
    <pre id="log" class="log" hidden></pre>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script type="module" src="/static/main.js"></script>
{% endblock %}
