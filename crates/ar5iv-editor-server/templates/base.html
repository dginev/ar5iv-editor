<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ar5iv Editor{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/style.css" />
    {# Inline so the theme is applied before first paint, avoiding a flash. #}
    <script>
      (function () {
        var KEY = "ar5iv-editor-theme";
        var THEMES = ["paper", "midnight", "terminal"];
        var saved = localStorage.getItem(KEY);
        var initial = THEMES.indexOf(saved) >= 0
          ? saved
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "midnight"
              : "paper");
        document.documentElement.dataset.theme = initial;
        window.__ar5ivTheme = {
          get: function () { return document.documentElement.dataset.theme; },
          set: function (t) {
            if (THEMES.indexOf(t) < 0) return;
            document.documentElement.dataset.theme = t;
            localStorage.setItem(KEY, t);
            window.dispatchEvent(new CustomEvent("ar5iv:themechange", { detail: { theme: t } }));
          },
          cycle: function () {
            var cur = document.documentElement.dataset.theme;
            var next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
            this.set(next);
          },
        };
      })();
    </script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="ar5iv-header">
      <a href="/editor" class="ar5iv-logo">ar5iv Editor</a>
      <nav>
        <a href="/editor">Editor</a>
        <a href="/upload">Upload</a>
        <a href="/vscode">VS Code</a>
        <a href="/schemas">Schemas</a>
        <a href="/about">About</a>
        <a href="/help">Help</a>
        <button id="theme-toggle" type="button" title="Cycle theme">Theme</button>
      </nav>
    </header>
    <main>{% block main %}{% endblock %}</main>
    <script>
      (function () {
        var btn = document.getElementById("theme-toggle");
        if (!btn) return;
        // Glyph per theme: sun for paper (light), crescent for
        // midnight (dark), CSS-drawn block cursor for terminal.
        // The terminal glyph is a `<span>` rather than a text
        // character because every Unicode "underscore-like"
        // codepoint sits at the bottom of its em box; a CSS bar
        // gives us pixel-perfect vertical centring with the label.
        var GLYPH_HTML = {
          paper:    "☀",
          midnight: "☾",
          terminal: "<span class=\"theme-toggle__cursor\"></span>",
        };
        var label = function () {
          var t = window.__ar5ivTheme.get();
          var g = GLYPH_HTML[t] || "";
          btn.innerHTML = "<span class=\"theme-toggle__glyph\" aria-hidden=\"true\">" +
            g + "</span><span class=\"theme-toggle__label\">" + t + "</span>";
          btn.setAttribute("aria-label", "Theme: " + t + " — click to cycle");
        };
        label();
        btn.addEventListener("click", function () { window.__ar5ivTheme.cycle(); });
        window.addEventListener("ar5iv:themechange", label);
      })();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
