# Override file for local rehearsal — `docker compose -f docker-compose.yml
# -f docker-compose.local.yml up -d`. Use only when there's no Caddy in
# front of Anubis.
#
# In production, Caddy on the host injects X-Real-Ip, which is what
# Anubis insists on. Hitting Anubis directly (curl on the host, or a
# browser at http://127.0.0.1:8080) means no upstream proxy and no
# X-Real-Ip header — Anubis 500s every request.
#
# `USE_REMOTE_ADDRESS=true` tells Anubis to fall back to the TCP
# RemoteAddr instead. Don't set this in production behind Caddy:
# Caddy connects to Anubis from 127.0.0.1, so every client would
# appear as 127.0.0.1.

services:
  anubis:
    environment:
      USE_REMOTE_ADDRESS: "true"
