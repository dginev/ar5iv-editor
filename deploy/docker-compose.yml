# docker-compose for the demo deploy: Anubis fronts the Axum binary,
# Caddy is left to the host (see deploy/cloud-demo.md). Tuned for a
# 1 vCPU / ~2 GB VM (currently an Azure VM, kpathsea 6.3.5 / TL2023);
# see the comments next to each value if you're on a bigger box.

services:
  anubis:
    image: ghcr.io/techarohq/anubis:latest
    restart: unless-stopped
    environment:
      BIND: ":8080"
      TARGET: "http://ar5iv-editor:3000"
      POLICY_FNAME: "/data/cfg/botPolicies.yaml"
      ED25519_PRIVATE_KEY_HEX: "${ANUBIS_KEY:?set ANUBIS_KEY in .env to a hex-encoded ed25519 private key}"
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-}"
    volumes:
      - ./anubis.yaml:/data/cfg/botPolicies.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"   # Caddy on the host fronts this
    depends_on:
      - ar5iv-editor

  ar5iv-editor:
    image: "${AR5IV_IMAGE:-ghcr.io/yourorg/ar5iv-editor:latest}"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      AR5IV_EDITOR_BIND: "0.0.0.0:3000"
      AR5IV_EDITOR_STATIC_DIR: "/app/frontend/dist"
      AR5IV_EDITOR_SCHEMA_DOCS_DIR: "/app/schema-docs"
      # VS Code for the Web assets for /vscode (bundled into the image by
      # deploy/build-and-push.sh). These match the image's ENV defaults;
      # listed here so the wiring is visible alongside the other paths.
      AR5IV_VSCODE_WEB_DIR: "/app/vscode-web"
      AR5IV_VSCODE_EXT_DIR: "/app/vscode-extension"
      AR5IV_EDITOR_SESSIONS_DIR: "/var/ar5iv-sessions"
      # Internal vnu service backing `/api/validate`. Unset (e.g.
      # running this service alone) degrades that route to a 503.
      AR5IV_EDITOR_VALIDATOR_URL: "http://validator:8888"
      RUST_LOG: "info,ar5iv_editor=info"
      # Demo-tightened quotas — tighter than the library defaults
      # so a single visitor can't pin the box. Bump back up if you
      # promote this from a demo.
      AR5IV_EDITOR_QUOTA_PER_IP: "4"
      AR5IV_EDITOR_SESSION_IDLE_SECS: "300"
      AR5IV_EDITOR_QUOTA_ROOT_BYTES: "536870912"   # 512 MB
      # Privacy/cleanup: disable latexml-oxide's content-addressed graphics
      # cache. It's on by default and persists converted figures under
      # $HOME/.cache/latexml-oxide/graphics (up to 2 GB) — *outside* the
      # per-session tmpfs the GC reaps. It's currently inert only because
      # HOME=/nonexistent is unwritable; set this so converted user content
      # can never start lingering across sessions if HOME ever changes.
      LATEXML_GRAPHICS_CACHE_OFF: "1"
      # Warm LSP engine pool (one latexml_oxide --server child per active
      # session; the engine binary ships in the image at /usr/local/bin).
      # Tuned for the 1536m cgroup BELOW, which also absorbs the 512 MB
      # session tmpfs: ONE warm child (~200 MB warm RSS) fits; the dev
      # default of 4 would OOM the whole container. Bump on bigger tiers
      # (4 GB box: pool 2, ceiling 1024).
      AR5IV_LSP_POOL: "1"
      # Per-child RSS ceiling (MiB): the child's own Watchdog kills a
      # runaway conversion (exit 137, clean per-request failure + respawn)
      # BEFORE the container's cgroup OOM-kills server+sessions wholesale.
      AR5IV_LSP_MAX_MEMORY_MB: "768"
    volumes:
      - ar5iv-sessions:/var/ar5iv-sessions
    # No `cpuset` pin. A bare `cpuset: "0"` confines the container to a single
    # core — a no-op on this 1-vCPU box, but it would silently waste every extra
    # core after a vCPU resize (the convert worker would still only ever touch
    # core 0). Let the scheduler use whatever cores the host exposes. If strict
    # isolation is ever wanted on a known multi-core box, set `cpuset` to an
    # explicit core *list* sized to that box — never a bare "0".
    #
    # Memory guard: cap the container so a runaway conversion — or a filled
    # 512 MB session tmpfs, which under cgroup v2 is charged to THIS cgroup —
    # OOM-kills its own container (which `restart: unless-stopped` recovers)
    # instead of swap-thrashing or OOM-killing the host and taking Anubis down
    # with it. 1536m leaves ~400 MB on the 1.9 GB box for the OS + Anubis;
    # raise it proportionally on a bigger tier.
    mem_limit: 1536m
    mem_reservation: 256m

  # vnu (Nu validator) service backing `/api/validate`. Single-purpose
  # JVM, never published — ar5iv-editor proxies to it, so the schema
  # default, the body cap, and the Anubis policy stay in one place.
  # The JVM runs -XX:+ExitOnOutOfMemoryError (validator.Dockerfile):
  # heap exhaustion exits cleanly and `restart` heals it; mem_limit is
  # the kernel backstop. 640m + the caps above still leave headroom
  # for the OS + Anubis on the 2 GB box, but it's snug — prefer the
  # 4 GB tier if validation traffic becomes routine.
  validator:
    image: "${AR5IV_VALIDATOR_IMAGE:-ghcr.io/yourorg/ar5iv-validator:latest}"
    restart: unless-stopped
    expose:
      - "8888"
    mem_limit: 640m
    mem_reservation: 128m

volumes:
  ar5iv-sessions:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # 512 MB on a 2 GB host leaves room for Anubis (~30 MB), the
      # Axum binary + worker (~250 MB), the kernel, and Caddy.
      # Bump to 1 GB on the 4 GB tier or 2 GB on Hetzner CCX13.
      o: "size=512m"
